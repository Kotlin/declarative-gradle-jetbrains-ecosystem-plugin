name: Publish

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish to GitHub packages
        run: |
          VERSION_COUNTER=$(git rev-list --count HEAD)
          ./gradlew publishAllPublicationsToGitHubPackagesRepository -PprojectVersion=0.${VERSION_COUNTER}.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}